<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.0/modern-normalize.min.css"
      integrity="sha512-3axTZ/bKFZH5/qLFTl4U+mDbBDFW+5QO5L7D1HnOhlhJbcNDIVJxoNm6It77g0eUdzfKZlHirayqRC2qJaAOJw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <!------- Page header ------->

    <header class="page-header">
      <div class="container header-container">
        <nav class="header-nav">
          <a class="header-logo" href="index.html">
            <svg class="header-logo-icon-part" width="16" height="16">
              <use href="./images/sprite.svg#icon-logo-mob"></use>
            </svg>
            <svg class="header-logo-icon-text" width="148" height="12">
              <use href="./images/sprite.svg#icon-text-logo-mob"></use>
            </svg>
          </a>
          <ul class="header-nav-list">
            <li class="header-nav-item">
              <a class="header-nav-link" href="#how-it-works">How It Works</a>
            </li>
            <li class="header-nav-item">
              <a class="header-nav-link" href="#vegetables">Vegetables</a>
            </li>
            <li class="header-nav-item">
              <a class="header-nav-link" href="#reviews">Reviews</a>
            </li>
          </ul>
        </nav>
        <a href="your-order" class="header-btn">Shop now</a>
        <button
          class="header-burger-btn js-open-menu"
          type="button"
          aria-expanded="false"
          aria-controls="mobile-menu"
        >
          <svg class="burger-icon" width="32" height="32">
            <use href="./images/sprite.svg#icon-burger-menu"></use>
          </svg>
        </button>
      </div>

      <!-- Mobile menu -->

      <div class="backdrop js-menu-container" id="mobile-menu">
        <div class="mob-menu">
          <div class="mob-menu-container">
            <button class="mob-menu-close js-close-menu" type="button">
              <svg class="mob-menu-close-icone" width="32" height="32">
                <use href="./images/icons.svg#icon-close"></use>
              </svg>
            </button>
            <nav class="mob-menu-nav">
              <ul class="mob-menu-nav-list">
                <li class="mob-menu-item">
                  <a href="#how-it-works">How It Works</a>
                </li>
                <li class="mob-menu-item">
                  <a href="#vegetables">Vegetables</a>
                </li>
                <li class="mob-menu-item">
                  <a href="#reviews">Reviews</a>
                </li>
              </ul>
            </nav>
            <a href="#your-order" class="menu-btn">Shop now</a>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
